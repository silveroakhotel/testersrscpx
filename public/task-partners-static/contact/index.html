<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/clarity.js"></script>
    <title>Contact | Task Partners</title>
    <meta name="description" content="Contact Task Partners support.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0F172A">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="Task Partners home"><span class="brand-mark" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="m5 12 4 4L19 6" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Task Partners</span></a>
        <a class="btn btn-secondary" href="/">Back Home</a>
      </div>
    </header>

    <main class="legal-hero">
      <section class="container legal-content">
        <div class="legal-card">
          <span class="eyebrow">Support</span>
          <h1>Contact Task Partners</h1>
          <p>Our support team can help with account access, product resources, billing questions, and refund requests.</p>
          <div class="contact-panel">
            <strong>Email Support</strong>
            <a href="mailto:support@taskpartners.live">support@taskpartners.live</a>
          </div>
          <form class="form" action="mailto:support@taskpartners.live" method="post" enctype="text/plain">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button class="btn btn-primary" type="submit">Send Message</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
