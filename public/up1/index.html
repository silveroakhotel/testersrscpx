  <script>
  (function () {
    var trackedEvents = Object.create(null);
    var pageStartedAt = Date.now();
    var confirmationStarted = false;
    var widgetContentReady = false;
    var params = new URLSearchParams(window.location.search);
    var allowedVendepayOrigins = new Set([
      "https://checkout.vendepay.com",
      "https://checkouthml.vendepay.com"
    ]);

    function cleanTag(value, fallback) {
      var cleaned = String(value || fallback || "unknown")
        .replace(/[^a-zA-Z0-9._-]/g, "_")
        .slice(0, 80);
      return cleaned || "unknown";
    }

    function setClarityTag(key, value) {
      if (typeof window.clarity !== "function") return;
      window.clarity("set", key, cleanTag(value));
    }

    function sendTikTokEvent(eventName) {
      if (!window.ttq || typeof window.ttq.track !== "function") return;

      var properties = {
        contents: [{
          content_id: "UP1_PROFILE_SYNC",
          content_type: "product",
          content_name: "Profile Synchronization"
        }],
        value: 37.00,
        currency: "USD"
      };

      if (eventName === "up1_page_view") {
        window.ttq.track("ViewContent", properties);
      } else if (eventName === "up1_confirm_started") {
        window.ttq.track("InitiateCheckout", properties);
      }
    }

    function trackUp1Event(eventName, details) {
      if (trackedEvents[eventName]) return;
      trackedEvents[eventName] = true;

      if (typeof window.clarity === "function") {
        window.clarity("event", eventName);
        window.clarity("set", "up1_stage", eventName);

        Object.keys(details || {}).forEach(function (key) {
          setClarityTag("up1_" + key, details[key]);
        });

        if (eventName === "up1_confirm_started") {
          window.clarity("upgrade", "up1_confirm_started");
        }
      }

      sendTikTokEvent(eventName);
    }

    window.trackUp1Event = trackUp1Event;

    setClarityTag("up1_source", params.get("utm_source") || params.get("src") || "direct");
    setClarityTag("up1_campaign", params.get("utm_campaign") || "none");
    setClarityTag("up1_has_venda_id", params.has("vendaId") ? "yes" : "no");
    setClarityTag("up1_has_order", params.has("order") ? "yes" : "no");
    setClarityTag("up1_device", window.innerWidth <= 768 ? "mobile" : "desktop");
    trackUp1Event("up1_page_view");

    if (!params.has("vendaId")) {
      trackUp1Event("up1_missing_venda_id");
    }

    function bindWidgetIframe(iframe) {
      if (!iframe || iframe.dataset.up1TrackingBound === "true") return;
      iframe.dataset.up1TrackingBound = "true";
      trackUp1Event("up1_widget_iframe_rendered");
      iframe.addEventListener("load", function () {
        trackUp1Event("up1_widget_iframe_loaded");
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      var container = document.getElementById("vendepay-upsell-container");
      if (!container) {
        trackUp1Event("up1_widget_container_missing");
        return;
      }

      bindWidgetIframe(container.querySelector("iframe"));

      new MutationObserver(function () {
        bindWidgetIframe(container.querySelector("iframe"));
      }).observe(container, { childList: true, subtree: true });
    });

    window.addEventListener("message", function (event) {
      if (!allowedVendepayOrigins.has(event.origin)) return;
      if (!event.data || event.data.source !== "VendepayUpsell") return;

      var type = event.data.type;

      if (type === "HEIGHT") {
        widgetContentReady = true;
        trackUp1Event("up1_widget_content_ready");
        return;
      }

      if (type === "PIX_OPEN" || type === "CC_OPEN") {
        confirmationStarted = true;
        trackUp1Event("up1_confirm_started", {
          payment_method: type === "PIX_OPEN" ? "pix" : "credit_card"
        });
        return;
      }

      if (type === "PIX_SUCCESS") {
        trackUp1Event("up1_payment_success", { payment_method: "pix" });
        return;
      }

      if (type === "CC_TOKEN") {
        trackUp1Event("up1_card_details_submitted", { payment_method: "credit_card" });
        return;
      }

      if (type === "CC_CLOSED" && !trackedEvents.up1_card_details_submitted) {
        trackUp1Event("up1_payment_flow_closed");
      }
    });

    window.setTimeout(function () {
      if (!widgetContentReady) trackUp1Event("up1_widget_not_ready_8s");
    }, 8000);

    window.setTimeout(function () {
      if (!confirmationStarted) trackUp1Event("up1_no_action_10s");
    }, 10000);

    window.setTimeout(function () {
      if (!confirmationStarted) trackUp1Event("up1_no_action_30s");
    }, 30000);

    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState !== "hidden" || confirmationStarted) return;

      var seconds = Math.round((Date.now() - pageStartedAt) / 1000);
      var bucket = seconds < 5 ? "under_5s" : seconds < 15 ? "5_to_14s" : seconds < 30 ? "15_to_29s" : "30s_plus";
      setClarityTag("up1_exit_time", bucket);
      trackUp1Event("up1_exit_without_action");
    });
  })();
  </script>

  <style>
    :root {
      --text: #121212;
      --divider: #e8e8e8;
      --cyan: #00f2fe;
      --pink: #fe2c55;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      opacity: 1;
      transition: opacity 180ms ease;
    }

    .loading-screen.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .loader-balls {
      position: relative;
      width: 72px;
      height: 32px;
      isolation: isolate;
    }

    .loader-ball {
      position: absolute;
      top: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      mix-blend-mode: multiply;
      will-change: transform;
    }

    .loader-ball--pink {
      left: 0;
      z-index: 2;
      background: var(--pink);
      animation: cross-pink 800ms cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .loader-ball--cyan {
      right: 0;
      z-index: 1;
      background: var(--cyan);
      animation: cross-cyan 800ms cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .loading-label {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }

    @keyframes cross-pink {
      0%,
      100% {
        z-index: 2;
        transform: translateX(0) scale(1);
      }

      25% {
        z-index: 3;
        transform: translateX(20px) scale(1.08);
      }

      50% {
        z-index: 1;
        transform: translateX(40px) scale(0.94);
      }

      75% {
        z-index: 1;
        transform: translateX(20px) scale(0.9);
      }
    }

    @keyframes cross-cyan {
      0%,
      100% {
        z-index: 1;
        transform: translateX(0) scale(1);
      }

      25% {
        z-index: 1;
        transform: translateX(-20px) scale(0.9);
      }

      50% {
        z-index: 2;
        transform: translateX(-40px) scale(0.94);
      }

      75% {
        z-index: 3;
        transform: translateX(-20px) scale(1.08);
      }
    }

    .app-screen {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease;
    }

    .app-screen.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .app-header {
      min-height: calc(52px + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 16px 0;
      border-bottom: 1px solid var(--divider);
      background: #ffffff;
    }

    .app-header h1 {
      display: flex;
      min-height: 52px;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1;
    }

    .content {
      width: min(100%, 420px);
      margin: 0 auto;
      padding: 24px 20px max(32px, env(safe-area-inset-bottom));
    }

    .message {
      margin: 0 0 24px;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
    }

    #vendepay-upsell-container {
      width: 100%;
      min-width: 0;
      margin: 0 auto;
      overflow: visible;
    }

    #vendepay-upsell-container iframe {
      display: block;
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 auto;
      border: 0;
    }

    @media (min-width: 421px) {
      .app-screen {
        max-width: 420px;
        margin: 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader-ball {
        animation-duration: 1400ms;
      }

      .loading-screen,
      .app-screen {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen" role="status" aria-label="Payment confirmed. Loading balance.">
    <div class="loading-content">
      <div class="loader-balls" aria-hidden="true">
        <span class="loader-ball loader-ball--pink"></span>
        <span class="loader-ball loader-ball--cyan"></span>
      </div>
      <p class="loading-label">Payment confirmed</p>
    </div>
  </div>

  <main class="app-screen" id="appScreen" aria-hidden="true">
    <header class="app-header">
      <h1>Balance</h1>
    </header>

    <section class="content" aria-label="Profile synchronization">
      <p class="message">To finalize the transfer to your linked account, please acknowledge that you agree with the standard Creator Service Agreement and terms of distribution.</p>

      <div id="vendepay-upsell-container"></div>
      <script src="https://widget.vendepay.com/upsell-widget/v1/vendepay-upsell-widget-1.0.16.js?upsellId=0ef69323-3f84-44af-bfa5-6d6987881c1c" onload="window.trackUp1Event && window.trackUp1Event('up1_widget_script_loaded'); window.VendepayUpsellWidget && window.VendepayUpsellWidget.showIframe('vendepay-upsell-container')"></script>
    </section>
  </main>

  <script>
    (function () {
      var loadingScreen = document.getElementById("loadingScreen");
      var appScreen = document.getElementById("appScreen");

      window.setTimeout(function () {
        loadingScreen.classList.add("is-hidden");
        appScreen.classList.add("is-visible");
        appScreen.setAttribute("aria-hidden", "false");
        window.trackUp1Event && window.trackUp1Event("up1_loader_complete");

        window.setTimeout(function () {
          loadingScreen.hidden = true;
        }, 200);
      }, 2000);
    })();
  </script>
</body>
</html>
