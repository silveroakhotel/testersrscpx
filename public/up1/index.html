  <style>
    :root {
      --text: #121212;
      --divider: #e8e8e8;
      --accent: #2563eb;
      --success: #178552;
      --success-background: #ecfdf3;
      --muted: #8a8a8e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: #ffffff;
      opacity: 1;
      transition: opacity 180ms ease;
    }

    .loading-screen.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      position: relative;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0 76%, #e9edf3 76% 100%);
      animation: spin 720ms linear infinite;
    }

    .spinner::after {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #ffffff;
      content: "";
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .app-screen {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease;
    }

    .app-screen.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .app-header {
      min-height: calc(52px + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 16px 0;
      border-bottom: 1px solid var(--divider);
      background: #ffffff;
    }

    .app-header h1 {
      display: flex;
      min-height: 52px;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1;
    }

    .content {
      width: min(100%, 420px);
      margin: 0 auto;
      padding: 24px 20px max(32px, env(safe-area-inset-bottom));
    }

    .metadata {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
    }

    .success-status {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      margin-bottom: 16px;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--success-background);
      color: var(--success);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    .message {
      margin: 0 0 24px;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
    }

    #vendepay-upsell-container {
      width: 100%;
      min-width: 0;
      margin: 0 auto;
      overflow: visible;
    }

    #vendepay-upsell-container iframe {
      display: block;
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 auto;
      border: 0;
    }

    @media (min-width: 421px) {
      .app-screen {
        max-width: 420px;
        margin: 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation-duration: 1400ms;
      }

      .loading-screen,
      .app-screen {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen" role="status" aria-label="Loading integration">
    <div class="spinner" aria-hidden="true"></div>
  </div>

  <main class="app-screen" id="appScreen" aria-hidden="true">
    <header class="app-header">
      <h1>Task Partners Integration</h1>
    </header>

    <section class="content" aria-label="Profile synchronization">
      <p class="metadata">Secure Sandbox Environment &bull; API Session Active</p>
      <div class="success-status" role="status">&#10003; Transaction confirmed</div>
      <p class="message">Account verification successfully completed. Confirm your user profile synchronization to secure your active session.</p>

      <div id="vendepay-upsell-container"></div>
      <script src="https://widget.vendepay.com/upsell-widget/v1/vendepay-upsell-widget-1.0.16.js?upsellId=0ef69323-3f84-44af-bfa5-6d6987881c1c" onload="window.VendepayUpsellWidget && window.VendepayUpsellWidget.showIframe('vendepay-upsell-container')"></script>
    </section>
  </main>

  <script>
    (function () {
      var loadingScreen = document.getElementById("loadingScreen");
      var appScreen = document.getElementById("appScreen");

      window.setTimeout(function () {
        loadingScreen.classList.add("is-hidden");
        appScreen.classList.add("is-visible");
        appScreen.setAttribute("aria-hidden", "false");

        window.setTimeout(function () {
          loadingScreen.hidden = true;
        }, 200);
      }, 1000);
    })();
  </script>
</body>
</html>
